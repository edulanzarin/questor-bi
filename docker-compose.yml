services:
  app:
    build: .
    container_name: questor-hub-app
    restart: unless-stopped
    # Acesso pela rede: http://<ip-do-computador>:4022
    # APP_PORT no .env.local muda a porta sem editar este arquivo.
    ports:
      - "${APP_PORT:-4022}:3000"
    env_file:
      - .env
    environment:
      # Dentro da rede do compose o banco próprio atende pelo nome do serviço.
      # Vem depois do env_file de propósito: sobrescreve o valor de dev (localhost:5022).
      APP_DB_URL: postgres://questorbi:${APP_DB_PASSWORD:?defina APP_DB_PASSWORD no .env}@app-db:5432/questorbi
    depends_on:
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  app-db:
    image: postgres:17-alpine
    container_name: questor-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: questorbi
      POSTGRES_USER: questorbi
      # Senha vem do .env (que é gitignored) — nunca fica neste arquivo.
      # A senha só é aplicada na PRIMEIRA subida, quando o volume é criado.
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:?defina APP_DB_PASSWORD no .env}
    # Sem `ports`: o app alcança o banco pela rede interna do compose
    # (app-db:5432). Publicar porta no host só serviria para acessar de fora, o
    # que em produção é risco e mais uma chance de colisão. Para desenvolver,
    # o docker-compose.dev.yml publica em 127.0.0.1:5022.
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questorbi -d questorbi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
    # Nome explícito seguindo a convenção <slug>-db-data, independente do nome da
    # pasta ou do COMPOSE_PROJECT_NAME.
    name: questor-hub-db-data

networks:
  # A rede default do projeto com nome explícito <slug>-net; os serviços falam
  # por nome (app-db:5432) dentro dela.
  default:
    name: questor-hub-net
