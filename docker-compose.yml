services:
  app:
    build: .
    container_name: questor-bi
    restart: unless-stopped
    # Acesso pela rede: http://<ip-do-computador>:4022
    # APP_PORT no .env.local muda a porta sem editar este arquivo.
    ports:
      - "${APP_PORT:-4022}:3000"
    env_file:
      - .env.local
    environment:
      # Dentro da rede do compose o banco próprio atende pelo nome do serviço.
      # Vem depois do env_file de propósito: sobrescreve o valor de dev (localhost:5433).
      APP_DB_URL: postgres://questorbi:questorbi@app-db:5432/questorbi
    depends_on:
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  app-db:
    image: postgres:17-alpine
    container_name: questor-bi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: questorbi
      POSTGRES_USER: questorbi
      POSTGRES_PASSWORD: questorbi
    # Sem `ports`: o app alcança o banco pela rede interna do compose
    # (app-db:5432). Publicar porta no host só serviria para acessar de fora, o
    # que em produção é risco e mais uma chance de colisão. Para desenvolver,
    # o docker-compose.dev.yml publica em 127.0.0.1:5433.
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questorbi -d questorbi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-db-data:
