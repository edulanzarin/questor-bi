services:
  app-db:
    image: postgres:17-alpine
    container_name: questor-bi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: questorbi
      POSTGRES_USER: questorbi
      POSTGRES_PASSWORD: questorbi
    ports:
      - "5433:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questorbi -d questorbi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-db-data:
